<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time .io Game</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #game-container { position: relative; }
        canvas { border: 2px solid #555; background: #000; cursor: crosshair; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        #overlay input { padding: 12px; font-size: 18px; border: none; border-radius: 4px; margin-bottom: 15px; width: 250px; text-align: center; }
        #overlay button { padding: 10px 30px; font-size: 18px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 4px; transition: 0.2s; }
        #overlay button:hover { background: #45a049; }

        #chat-input-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: none; width: 400px;
        }
        #chat-input { width: 100%; padding: 10px; border-radius: 20px; border: 2px solid #4caf50; background: rgba(0,0,0,0.7); color: white; outline: none; }

        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="overlay">
            <h1 style="margin-bottom: 30px;">.io Game Prototype</h1>
            <input type="text" id="nickname" placeholder="Enter Nickname" maxlength="12">
            <button id="start-btn">Join Game</button>
        </div>

        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Type a message and press Enter..." maxlength="50">
        </div>

        <div id="ui">
            <p>WASD to move | Mouse Click to move | Enter to Chat</p>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const nicknameInput = document.getElementById('nickname');
        const chatInputContainer = document.getElementById('chat-input-container');
        const chatInput = document.getElementById('chat-input');

        let myId = null;
        let players = {};
        let stateBuffer = []; // Buffer to store server states
        const RENDER_DELAY = 100; // 100ms delay for smooth interpolation
        let inGame = false;
        let isChatting = false;

        const keys = { w: false, a: false, s: false, d: false };

        // Game Start
        startBtn.onclick = () => {
            const nick = nicknameInput.value.trim();
            if (nick) {
                socket.emit('join', nick);
                overlay.style.display = 'none';
                inGame = true;
            } else {
                alert("Please enter a nickname!");
            }
        };

        window.addEventListener('keydown', (e) => {
            if (!inGame) return;
            
            if (e.key === 'Enter') {
                if (isChatting) {
                    // Send message
                    const msg = chatInput.value.trim();
                    if (msg) socket.emit('chat', msg);
                    chatInput.value = '';
                    chatInputContainer.style.display = 'none';
                    isChatting = false;
                } else {
                    // Open chat
                    chatInputContainer.style.display = 'block';
                    chatInput.focus();
                    isChatting = true;
                }
                return;
            }

            if (isChatting) return; // Disable movement while chatting

            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        canvas.addEventListener('mousedown', (e) => {
            if (!inGame || isChatting) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            socket.emit('move-to', { x, y });
        });

        socket.on('init', (id) => {
            myId = id;
        });

        socket.on('state', (serverData) => {
            // Push state into buffer for interpolation
            stateBuffer.push({
                players: serverData.players,
                ts: serverData.ts
            });
            
            // Limit buffer size
            if (stateBuffer.length > 20) stateBuffer.shift();
            
            // Keep the latest players object for non-position data
            players = serverData.players;
        });

        function update() {
            if (inGame && !isChatting) {
                socket.emit('input', keys);
            }
        }

        function drawChatBubble(x, y, text) {
            if (!text) return;
            
            ctx.font = '14px Arial';
            const textWidth = ctx.measureText(text).width;
            const padding = 8;
            const bubbleWidth = textWidth + padding * 2;
            const bubbleHeight = 25;
            const bubbleX = x - bubbleWidth / 2;
            const bubbleY = y - 65;

            // Draw Bubble
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.roundRect(bubbleX, bubbleY, bubbleWidth, bubbleHeight, 5);
            ctx.fill();

            // Draw Tail
            ctx.beginPath();
            ctx.moveTo(x, bubbleY + bubbleHeight);
            ctx.lineTo(x - 5, bubbleY + bubbleHeight + 5);
            ctx.lineTo(x + 5, bubbleY + bubbleHeight + 5);
            ctx.fill();

            // Draw Text
            ctx.fillStyle = 'black';
            ctx.textAlign = 'center';
            ctx.fillText(text, x, bubbleY + 17);
        }

        function interpolate(p1, p2, ratio) {
            return p1 + (p2 - p1) * ratio;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const now = Date.now();
            const renderTime = now - RENDER_DELAY;

            // Find the two states to interpolate between
            let state1 = null;
            let state2 = null;

            for (let i = 0; i < stateBuffer.length - 1; i++) {
                const s1 = stateBuffer[i];
                const s2 = stateBuffer[i + 1];
                if (renderTime >= s1.ts && renderTime <= s2.ts) {
                    state1 = s1;
                    state2 = s2;
                    break;
                }
            }

            for (const id in players) {
                const player = players[id];
                let renderX = player.x;
                let renderY = player.y;

                // Interpolate position
                if (state1 && state2 && state1.players[id] && state2.players[id]) {
                    const ratio = (renderTime - state1.ts) / (state2.ts - state1.ts);
                    renderX = interpolate(state1.players[id].x, state2.players[id].x, ratio);
                    renderY = interpolate(state1.players[id].y, state2.players[id].y, ratio);
                }
                
                // Draw Player
                ctx.fillStyle = player.color;
                ctx.fillRect(renderX - 15, renderY - 15, 30, 30);

                if (id === myId) {
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(renderX - 15, renderY - 15, 30, 30);
                }

                // Draw Nickname
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(player.nickname, renderX, renderY - 25);

                // Draw Chat Bubble
                if (player.message) {
                    drawChatBubble(renderX, renderY, player.message);
                }
            }

            requestAnimationFrame(draw);
        }

        setInterval(update, 1000 / 30);
        draw();
    </script>
</body>
</html>
